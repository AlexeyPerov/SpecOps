<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SpecOps</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob:"
    />
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      #app.shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-bottom: 1px solid #ccc;
      }
      .toolbar button {
        cursor: pointer;
      }
      .status-line {
        margin-left: auto;
        font-size: 12px;
        opacity: 0.75;
      }
      .split {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 8px;
        min-height: 0;
        box-sizing: border-box;
      }
      #editor {
        width: 100%;
        height: 100%;
        min-height: 200px;
        resize: none;
        box-sizing: border-box;
        font-family: ui-monospace, monospace;
        font-size: 13px;
      }
      .preview-pane {
        overflow-y: auto;
        user-select: text;
        border: 1px solid #ccc;
        padding: 8px;
        box-sizing: border-box;
        min-height: 200px;
      }
      .preview-pane .preview-fallback {
        color: #b00020;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <main id="app" class="shell"></main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
