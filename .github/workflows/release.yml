name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-tag:
    name: validate semver tag
    runs-on: ubuntu-latest
    steps:
      - name: Require semver tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # GitHub tag globs are not full regexes; enforce semver here before builds.
          # Accepts vMAJOR.MINOR.PATCH with optional -prerelease and +buildmetadata.
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' is not a valid semver release tag."
            echo "Expected forms: v1.2.3, v1.2.3-beta.1, v1.2.3+build.1"
            exit 1
          fi
          echo "Tag $TAG is a valid semver release tag."

  build:
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows-latest
            rust-targets: ''
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: SpecOps ${{ github.ref_name }}
          releaseBody: Release ${{ github.ref_name }} for macOS and Windows.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
