<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Settings</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' blob:"
    />
  </head>
  <body class="settings-body">
    <main class="settings-shell">
      <h1 class="settings-title">Settings</h1>
      <div class="settings-fields">
        <label class="settings-row">
          <input type="checkbox" id="setting-wrap" />
          <span>Wrap lines</span>
        </label>
        <label class="settings-row">
          <input type="checkbox" id="setting-autosave" />
          <span>Autosave</span>
        </label>
        <label class="settings-stack">
          <span class="settings-stack-label">Theme</span>
          <select id="setting-theme" class="settings-select" aria-label="Theme">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
        <label class="settings-row">
          <input type="checkbox" id="setting-line-numbers" />
          <span>Line numbers</span>
        </label>
        <label class="settings-stack">
          <span class="settings-stack-label">Editor font size (px)</span>
          <input
            type="number"
            id="setting-editor-font-size"
            class="settings-select"
            min="10"
            max="24"
            step="1"
            inputmode="numeric"
          />
        </label>
        <label class="settings-stack">
          <span class="settings-stack-label">Preview font size (px)</span>
          <input
            type="number"
            id="setting-preview-font-size"
            class="settings-select"
            min="10"
            max="24"
            step="1"
            inputmode="numeric"
          />
        </label>
        <button type="button" id="clear-projects" class="toolbar-btn settings-danger-btn">
          Clear projects list
        </button>
        <label class="settings-stack">
          <span class="settings-stack-label">Markdown scan folders</span>
          <span class="settings-stack-hint">Relative to each project folder; one path per line. Nested markdown files under each root are included.</span>
          <textarea id="setting-scan-folders" class="settings-textarea" rows="5" spellcheck="false"></textarea>
        </label>
      </div>
    </main>
    <script type="module" src="./settingsMain.ts"></script>
  </body>
</html>
